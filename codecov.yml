# Codecov configuration
# https://docs.codecov.com/docs/codecovyml-reference

coverage:
  status:
    # Overall project coverage check
    project:
      default:
        # Don't fail the check based on absolute coverage
        # Just report the coverage level
        informational: true
    # Per-PR coverage change check
    patch:
      default:
        # New/changed code in a PR must be covered. This ratchets quality
        # forward without requiring the whole legacy baseline to be tested.
        target: 80%
        # Allow a small slack so trivial untestable lines don't block a PR.
        threshold: 5%
        informational: false

# Comment settings for PR coverage reports
comment:
  layout: "reach,diff,flags,files"
  behavior: default
  require_changes: false
  require_base: false
  require_head: true

# Ignore these paths in coverage calculations
ignore:
  - "**/*.spec.ts"
  - "**/*.test.ts"
  - "tests/**"
  - "ts_emitted/**"
  - "node_modules/**"
  - "coverage/**"
  - "build_scripts/**"
  - "src/generated/**"
  - "ogm_types.ts"
  - "typeDefs.ts"
  - "**/*.d.ts"
