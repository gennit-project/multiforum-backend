# Codecov configuration
# https://docs.codecov.com/docs/codecovyml-reference

coverage:
  status:
    # Overall project coverage check
    project:
      default:
        # Don't fail the check based on absolute coverage
        # Just report the coverage level
        informational: true
    # Per-PR coverage change check
    patch:
      default:
        # Report patch (changed-lines) coverage on PRs, but never block. With
        # the legacy codebase well below 80%, a hard patch gate blocks nearly
        # every normal PR, so coverage is informational only for now.
        informational: true

# Coverage is uploaded from two CI jobs under separate flags and merged by
# Codecov: `unit` (fast `npm test`) and `integration` (Testcontainers Neo4j).
# A line covered by either suite counts as covered for the project total.
# carryforward keeps the last known coverage for a flag if a run doesn't upload
# it (e.g. a flaky container run), so it doesn't spuriously drop the total.
flags:
  unit:
    carryforward: true
  integration:
    carryforward: true

# Comment settings for PR coverage reports
comment:
  layout: "reach,diff,flags,files"
  behavior: default
  require_changes: false
  require_base: false
  require_head: true

# Ignore these paths in coverage calculations
ignore:
  - "**/*.spec.ts"
  - "**/*.test.ts"
  - "tests/**"
  - "ts_emitted/**"
  - "node_modules/**"
  - "coverage/**"
  - "build_scripts/**"
  - "src/generated/**"
  - "ogm_types.ts"
  - "typeDefs.ts"
  - "index.ts"
  - "**/*.d.ts"
