name: Tests CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Clean install dependencies
        run: npm ci

      - name: Run TypeScript type checking
        run: npm run tsc

      - name: Run unit tests with coverage
        run: npm run coverage

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage/lcov.info
          fail_ci_if_error: false
          verbose: true

      - name: Verify build (tsc + cypher copy)
        run: npm run build

  integration-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Clean install dependencies
        run: npm ci

      # Testcontainers manages the Neo4j container itself via the Docker daemon
      # that is available on GitHub-hosted Ubuntu runners.
      - name: Run Cypher integration tests against live Neo4j
        run: npm run test:integration
