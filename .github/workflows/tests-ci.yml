name: Tests CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Clean install dependencies
        run: npm ci

      # Generated type files (ogm_types.ts, src/generated/graphql.ts) are no
      # longer committed; regenerate them from typeDefs.ts (no DB needed) before
      # type checking and tests so imports resolve.
      - name: Generate GraphQL/OGM types
        run: npm run codegen

      - name: Lint (enforces no console.* in runtime code)
        run: npm run lint

      - name: Run TypeScript type checking
        run: npm run tsc

      - name: Check for circular dependencies
        run: npm run lint:circular

      - name: Run unit tests with coverage
        run: npm run coverage

      - name: Upload unit coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage/lcov.info
          flags: unit
          fail_ci_if_error: false
          verbose: true

      - name: Verify build (tsc + cypher copy)
        run: npm run build

  integration-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Clean install dependencies
        run: npm ci

      # Generated type files are no longer committed; regenerate before tests.
      - name: Generate GraphQL/OGM types
        run: npm run codegen

      # Testcontainers manages the Neo4j container itself via the Docker daemon
      # that is available on GitHub-hosted Ubuntu runners. Run under c8 so the
      # resolver coverage these tests provide is reported too.
      - name: Run integration tests against live Neo4j (with coverage)
        run: npm run coverage:integration

      # Uploaded under the `integration` flag; Codecov merges it with the unit
      # upload so a line covered by either suite counts as covered.
      - name: Upload integration coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage/lcov.info
          flags: integration
          fail_ci_if_error: false
          verbose: true
